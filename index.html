<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Editor de Guia v6.7</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      font-family: Arial, sans-serif; 
      background: #e5e5e5; 
      overflow-x: hidden;
    }
    #toolbar {
      background: #fff;
      padding: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    #toolbar button {
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      border-radius: 6px;
      cursor: pointer;
    }
    #toolbar button:active {
      background: #ddd;
    }
    #canvas-wrap {
      display: flex;
      justify-content: center;
      padding: 10px;
    }
   .canvas-container {
      max-width: 100%!important;
      height: auto!important;
    }
    canvas {
      border: 2px solid #333;
      background: #fff;
      max-width: 100%;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button onclick="addTexto()">Texto</button>
    <button onclick="document.getElementById('imgInput').click()">Imagem</button>
    <button onclick="mudarFundo()">Fundo</button>
    <button onclick="girar()" id="btnGirar" style="display:none">Girar</button>
    <button onclick="mudarOpacidade()" id="btnOpacidade" style="display:none">Opacidade</button>
    <button onclick="excluir()">Excluir</button>
  </div>
  
  <input type="file" id="imgInput" accept="image/*" onchange="addImagem(event)">
  
  <div id="canvas-wrap">
    <canvas id="editor"></canvas>
  </div>

  <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
  <script>
    // Canvas responsivo: ajusta ao tamanho da tela
    const largura = window.innerWidth - 24; // 10px padding cada lado + 2px borda
    const altura = largura * 1.25; // Proporção 4:5 do Instagram
    
    const canvasEl = document.getElementById('editor');
    canvasEl.width = 1080;
    canvasEl.height = 1350;
    
    const canvas = new fabric.Canvas('editor');
    canvas.setDimensions({ width: largura, height: altura });
    canvas.setZoom(largura / 1080);
    
    canvas.on('selection:created', mostrarBotoes);
    canvas.on('selection:updated', mostrarBotoes);
    canvas.on('selection:cleared', esconderBotoes);
    
    function mostrarBotoes() {
      document.getElementById('btnGirar').style.display = 'block';
      document.getElementById('btnOpacidade').style.display = 'block';
    }
    
    function esconderBotoes() {
      document.getElementById('btnGirar').style.display = 'none';
      document.getElementById('btnOpacidade').style.display = 'none';
    }

    function addTexto() {
      const texto = new fabric.IText('Digite aqui', { 
        left: 540, 
        top: 675, 
        originX: 'center', 
        originY: 'center', 
        fontSize: 80, 
        fill: '#000000',
        fontFamily: 'Arial',
        editable: true
      });
      canvas.add(texto);
      canvas.setActiveObject(texto);
      texto.enterEditing();
      texto.selectAll();
      canvas.renderAll();
    }

    function addImagem(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(f) {
        fabric.Image.fromURL(f.target.result, function(img) {
          img.scaleToWidth(400);
          img.set({ left: 540, top: 675, originX: 'center', originY: 'center' });
          canvas.add(img).setActiveObject(img);
        });
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    function mudarFundo() {
      const cor = prompt('Digite: preto, branco, vermelho, azul, verde, amarelo', 'branco');
      const cores = {
        'preto': '#000000',
        'branco': '#FFFFFF',
        'vermelho': '#FF0000',
        'azul': '#0000FF',
        'verde': '#00FF00',
        'amarelo': '#FFFF00'
      };
      if (cores[cor]) {
        canvas.setBackgroundColor(cores[cor], canvas.renderAll.bind(canvas));
      }
    }

    function girar() {
      const obj = canvas.getActiveObject();
      if (obj) {
        obj.rotate(obj.angle + 90);
        canvas.renderAll();
      }
    }

    function mudarOpacidade() {
      const obj = canvas.getActiveObject();
      if (obj) {
        const nova = prompt('Opacidade de 0 a 100:', '100');
        if (nova!== null) {
          obj.set('opacity', parseInt(nova) / 100);
          canvas.renderAll();
        }
      }
    }

    function excluir() {
      const obj = canvas.getActiveObject();
      if (obj) {
        canvas.remove(obj);
      }
    }
  </script>
</body>
</html>
