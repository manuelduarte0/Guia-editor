<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Editor de Foto v6.11</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff;text-align:center;overflow-x:hidden}
#editor-container{position:relative;width:95vw;max-width:500px;margin:10px auto}
canvas{display:block;width:100%;border:2px solid #333;touch-action:none;background:#fff}
.controls{padding:10px;max-width:500px;margin:0 auto}
input[type=text], select{padding:8px;width:60%;margin:4px;border-radius:6px;border:none}
button{background:#27ae60;border:none;padding:9px 10px;margin:3px;border-radius:8px;color:#fff;font-size:13px}
.btn-azul{background:#2980b9}
.btn-roxo{background:#8e44ad}
.btn-laranja{background:#d35400}
.btn-preto{background:#2c3e50}
.btn-cinza{background:#7f8c8d}
.file-wrap{margin:8px 0}

/* PAINEL COMPACTO COM SCROLL */
#painelSetas{
  display:none;
  background:#1e1e1e;
  padding:8px;
  margin:8px auto;
  border-radius:12px;
  width:95%;
  max-width:500px;
  border:2px solid #3498db;
  max-height:60vh;
  overflow-y:auto;
}
#painelSetas h3{margin:0 0 8px 0;font-size:15px;color:#3498db}
.seta{background:#34495e;font-size:16px;padding:8px 12px}
.seta-move{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:160px;margin:8px auto}
.seta-move button{padding:10px}
.cor-picker{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap}
.cor{width:28px;height:28px;border-radius:50%;border:2px solid #fff;cursor:pointer}
#menuFundos{display:none;background:#1e1e1e;padding:12px;margin:10px auto;border-radius:12px;width:95%;max-width:500px}
#menuOverlay{display:none;background:#1e1e1e;padding:12px;margin:10px auto;border-radius:12px;width:95%;max-width:500px}
.fundo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.fundo-op{width:100%;height:40px;border-radius:6px;border:2px solid #fff;cursor:pointer}
.slider-grupo{margin:8px 0}
.slider-grupo label{font-size:12px;display:block;margin-bottom:4px}
input[type=range]{width:85%}
#controlesNormais{display:block}
</style>
</head>
<body>
<h2>Editor v6.11</h2>

<div class="file-wrap">
  <input type="file" id="upload" accept="image/*"> Foto base<br>
  <input type="file" id="uploadOverlay" accept="image/*"> Add imagem por cima
</div>

<div id="editor-container">
  <canvas id="canvas"></canvas>
</div>

<!-- PAINEL DE SETAS - AGORA COMPACTO -->
<div id="painelSetas">
  <h3 id="tituloObj">Editando Texto</h3>

  <div class="seta-move">
    <div></div>
    <button class="seta" onclick="mover(0,-5)">↑</button>
    <div></div>
    <button class="seta" onclick="mover(-5,0)">←</button>
    <button class="seta" onclick="mover(0,0)">●</button>
    <button class="seta" onclick="mover(5,0)">→</button>
    <div></div>
    <button class="seta" onclick="mover(0,5)">↓</button>
    <div></div>
  </div>

  <button class="seta" onclick="alterarTamanho(1.1)">Tamanho +</button>
  <button class="seta" onclick="alterarTamanho(0.9)">Tamanho -</button>
  <button class="seta" onclick="rotacionar(90)">90°</button>
  <button class="seta" onclick="rotacionar(180)">180°</button>
  <button class="seta" onclick="rotacionar(-90)">-90°</button><br>

  <div class="slider-grupo">
    <label>Rotação: <span id="rotacaoValor">0</span>°</label>
    <input type="range" id="rotacaoSlider" min="0" max="360" value="0" oninput="mudarRotacaoLivre(this.value)">
  </div>

  <div class="slider-grupo">
    <label>Opacidade: <span id="opacidadeValor">100</span>%</label>
    <input type="range" id="opacidadeSlider" min="0" max="100" value="100" oninput="mudarOpacidade(this.value)">
  </div>

  <div id="opcoesTexto" style="display:none">
    <input type="color" id="corTexto" value="#000000" onchange="mudarCor(this.value)">
    <select id="fonteTexto" onchange="mudarFonte(this.value)">
      <option value="Arial">Arial</option>
      <option value="Impact">Impact</option>
      <option value="Georgia">Georgia</option>
      <option value="Comic Sans MS">Comic Sans</option>
      <option value="Courier New">Courier</option>
      <option value="Verdana">Verdana</option>
    </select>
    <div class="cor-picker">
      <div class="cor" style="background:#ffffff" onclick="mudarCor('#ffffff')"></div>
      <div class="cor" style="background:#000000" onclick="mudarCor('#000000')"></div>
      <div class="cor" style="background:#e74c3c" onclick="mudarCor('#e74c3c')"></div>
      <div class="cor" style="background:#3498db" onclick="mudarCor('#3498db')"></div>
      <div class="cor" style="background:#2ecc71" onclick="mudarCor('#2ecc71')"></div>
      <div class="cor" style="background:#f1c40f" onclick="mudarCor('#f1c40f')"></div>
      <div class="cor" style="background:#9b59b6" onclick="mudarCor('#9b59b6')"></div>
    </div>
  </div>

  <button onclick="deletar()" class="btn-laranja">Deletar</button>
  <button onclick="desselecionar()" class="btn-roxo">Fechar</button>
</div>

<!-- CONTROLES NORMAIS - SEMPRE VISÍVEIS QUANDO SEM SELEÇÃO -->
<div class="controls" id="controlesNormais">
  <button onclick="zoomBase(1.2)">Zoom + Base</button>
  <button onclick="zoomBase(0.8)">Zoom - Base</button>
  <button onclick="girar()">Girar 90°</button><br>
  <button onclick="abrirMenuFundos()" class="btn-preto">Fundo</button>
  <button onclick="abrirMenuOverlay()" class="btn-cinza">Camada Cor</button><br>

  <input type="text" id="texto" placeholder="Digite seu texto">
  <button onclick="addTexto()" class="btn-azul">Add Texto</button><br>

  Brilho <input type="range" id="brilho" min="0" max="200" value="100" oninput="desenhar()"><br>
  Contraste <input type="range" id="contraste" min="0" max="200" value="100" oninput="desenhar()"><br>

  <button onclick="reset()" class="btn-roxo">Resetar Tudo</button>
  <button onclick="salvar()">Salvar PNG</button>
</div>

<div id="menuFundos">
  <h3>Fundo do Canvas</h3>
  <div class="fundo-grid" id="gridFundos"></div>
  <button onclick="fecharMenuFundos()" class="btn-roxo">Fechar</button>
</div>

<div id="menuOverlay">
  <h3>Camada de Cor por Cima</h3>
  <div class="fundo-grid" id="gridOverlay"></div>
  <div class="slider-grupo">
    <label>Opacidade da Camada: <span id="overlayOpacidadeValor">50</span>%</label>
    <input type="range" id="overlayOpacidade" min="0" max="100" value="50" oninput="mudarOverlayOpacidade(this.value)">
  </div>
  <button onclick="removerOverlay()" class="btn-cinza">Remover Camada</button>
  <button onclick="fecharMenuOverlay()" class="btn-roxo">Fechar</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const painelSetas = document.getElementById('painelSetas');
const controlesNormais = document.getElementById('controlesNormais');
const opcoesTexto = document.getElementById('opcoesTexto');
const menuFundos = document.getElementById('menuFundos');
const menuOverlay = document.getElementById('menuOverlay');
let img = new Image();
let scale = 1, rotacao = 0;
let objetos = [];
let selecionado = null;
let corFundo = '#FFFFFF';
let overlay = {ativo: false, cor: '#000000', opacity: 0.5};

const coresFundo = [
'#FFFFFF','#000000','#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c',
'#34495e','#e67e22','#95a5a6','#d35400','#27ae60','#2980b9','#8e44ad','#c0392b',
'#16a085','#f39c12','#7f8c8d','#2c3e50'
];

const gridFundos = document.getElementById('gridFundos');
coresFundo.forEach(cor => {
  const div = document.createElement('div');
  div.className = 'fundo-op';
  div.style.background = cor;
  div.onclick = () => aplicarFundo(cor);
  gridFundos.appendChild(div);
});

const gridOverlay = document.getElementById('gridOverlay');
coresFundo.forEach(cor => {
  const div = document.createElement('div');
  div.className = 'fundo-op';
  div.style.background = cor;
  div.onclick = () => aplicarOverlay(cor);
  gridOverlay.appendChild(div);
});

function aplicarFundo(cor){
  corFundo = cor;
  desenhar();
  fecharMenuFundos();
}

function aplicarOverlay(cor){
  overlay.ativo = true;
  overlay.cor = cor;
  desenhar();
}

function mudarOverlayOpacidade(valor){
  overlay.opacity = valor / 100;
  document.getElementById('overlayOpacidadeValor').innerText = valor;
  desenhar();
}

function removerOverlay(){
  overlay.ativo = false;
  desenhar();
}

function abrirMenuFundos(){ menuFundos.style.display = 'block'; menuOverlay.style.display = 'none'; }
function fecharMenuFundos(){ menuFundos.style.display = 'none'; }
function abrirMenuOverlay(){ menuOverlay.style.display = 'block'; menuFundos.style.display = 'none'; }
function fecharMenuOverlay(){ menuOverlay.style.display = 'none'; }

upload.onchange = e => {
  const file = e.target.files[0];
  img.src = URL.createObjectURL(file);
  img.onload = () => {
    fitToScreen();
    desenhar();
  }
}

uploadOverlay.onchange = e => {
  const file = e.target.files[0];
  let novaImg = new Image();
  novaImg.src = URL.createObjectURL(file);
  novaImg.onload = () => {
    objetos.push({
      tipo: 'img',
      img: novaImg,
      x: canvas.width/2,
      y: canvas.height/2,
      w: 150,
      h: 150 * (novaImg.height/novaImg.width),
      scale: 1,
      rotacao: 0,
      opacity: 1
    });
    selecionar(objetos.length - 1);
    desenhar();
  }
}

function fitToScreen(){
  let container = document.getElementById('editor-container');
  let maxW = container.offsetWidth;
  if(img.width > 0){
    let ratio = img.width / img.height;
    canvas.width = maxW;
    canvas.height = maxW / ratio;
    scale = canvas.width / img.width;
  } else {
    canvas.width = maxW;
    canvas.height = maxW;
  }
}

function desenhar() {
  ctx.fillStyle = corFundo;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if(img.src){
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(rotacao * Math.PI / 180);
    ctx.scale(scale, scale);
    ctx.filter = `brightness(${brilho.value}%) contrast(${contraste.value}%)`;
    ctx.drawImage(img, -img.width/2, -img.height/2);
    ctx.restore();
  }

  if(overlay.ativo){
    ctx.save();
    ctx.globalAlpha = overlay.opacity;
    ctx.fillStyle = overlay.cor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  objetos.forEach((obj, i) => {
    ctx.save();
    ctx.globalAlpha = obj.opacity || 1;
    ctx.translate(obj.x, obj.y);
    ctx.rotate(obj.rotacao * Math.PI / 180);
    ctx.scale(obj.scale, obj.scale);

    if(obj.tipo === 'texto'){
      ctx.font = `bold ${obj.size}px ${obj.fonte}`;
      ctx.fillStyle = obj.cor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(obj.txt, 0, 0);
      if(selecionado === i){
        let w = ctx.measureText(obj.txt).width;
        ctx.strokeStyle = '#2980b9';
        ctx.lineWidth = 2;
        ctx.setLineDash([5,5]);
        ctx.strokeRect(-w/2-8, -obj.size/2-8, w+16, obj.size+16);
        ctx.setLineDash([]);
      }
    } else if(obj.tipo === 'img'){
      ctx.drawImage(obj.img, -obj.w/2, -obj.h/2, obj.w, obj.h);
      if(selecionado === i){
        ctx.strokeStyle = '#2980b9';
        ctx.lineWidth = 3;
        ctx.setLineDash([5,5]);
        ctx.strokeRect(-obj.w/2, -obj.h/2, obj.w, obj.h);
        ctx.setLineDash([]);
      }
    }
    ctx.restore();
  });
}

function selecionar(index){
  selecionado = index;
  painelSetas.style.display = 'block';
  controlesNormais.style.display = 'none';
  document.getElementById('opacidadeSlider').value = (objetos[index].opacity || 1) * 100;
  document.getElementById('opacidadeValor').innerText = Math.round((objetos[index].opacity || 1) * 100);
  document.getElementById('rotacaoSlider').value = objetos[index].rotacao || 0;
  document.getElementById('rotacaoValor').innerText = Math.round(objetos[index].rotacao || 0);
  if(objetos[index].tipo === 'texto'){
    tituloObj.innerText = 'Editando Texto';
    opcoesTexto.style.display = 'block';
    corTexto.value = objetos[index].cor;
    fonteTexto.value = objetos[index].fonte;
  } else {
    tituloObj.innerText = 'Editando Imagem';
    opcoesTexto.style.display = 'none';
  }
  desenhar();
}

function desselecionar(){
  selecionado = null;
  painelSetas.style.display = 'none';
  controlesNormais.style.display = 'block';
  desenhar();
}

function mover(dx, dy){
  if(selecionado === null) return;
  objetos[selecionado].x += dx;
  objetos[selecionado].y += dy;
  desenhar();
}

function alterarTamanho(fator){
  if(selecionado === null) return;
  let obj = objetos[selecionado];
  if(obj.tipo === 'texto'){
    obj.size *= fator;
    if(obj.size < 10) obj.size = 10;
    if(obj.size > 200) obj.size = 200;
  } else {
    obj.scale *= fator;
    if(obj.scale < 0.1) obj.scale = 0.1;
    if(obj.scale > 5) obj.scale = 5;
  }
  desenhar();
}

function rotacionar(graus){
  if(selecionado === null) return;
  objetos[selecionado].rotacao = (objetos[selecionado].rotacao + graus) % 360;
  document.getElementById('rotacaoSlider').value = objetos[selecionado].rotacao;
  document.getElementById('rotacaoValor').innerText = Math.round(objetos[selecionado].rotacao);
  desenhar();
}

function mudarRotacaoLivre(valor){
  if(selecionado === null) return;
  objetos[selecionado].rotacao = parseFloat(valor);
  document.getElementById('rotacaoValor').innerText = Math.round(valor);
  desenhar();
}

function mudarOpacidade(valor){
  if(selecionado === null) return;
  objetos[selecionado].opacity = valor / 100;
  document.getElementById('opacidadeValor').innerText = valor;
  desenhar();
}

function mudarCor(cor){
  if(selecionado === null || objetos[selecionado].tipo!== 'texto') return;
  objetos[selecionado].cor = cor;
  desenhar();
}

function mudarFonte(fonte){
  if(selecionado === null || objetos[selecionado].tipo!== 'texto') return;
  objetos[selecionado].fonte = fonte;
  desenhar();
}

function zoomBase(fator){
  scale *= fator;
  desenhar();
}

function girar() {
  rotacao = (rotacao + 90) % 360;
  desenhar();
}

function addTexto() {
  if(!texto.value) return;
  objetos.push({
    tipo: 'texto',
    txt: texto.value,
    x: canvas.width/2,
    y: canvas.height/2,
    size: 40,
    scale: 1,
    rotacao: 0,
    cor: '#000000',
    fonte: 'Arial',
    opacity: 1
  });
  selecionar(objetos.length - 1);
  texto.value = '';
  desenhar();
}

function deletar(){
  if(selecionado!== null){
    objetos.splice(selecionado, 1);
    desselecionar();
  }
}

function reset() {
  scale = 1; rotacao = 0; objetos = []; corFundo = '#FFFFFF';
  overlay = {ativo: false, cor: '#000000', opacity: 0.5};
  img = new Image();
  desselecionar();
  brilho.value = contraste.value = 100;
  fitToScreen();
  desenhar();
}

function salvar() {
  let temp = selecionado;
  desselecionar();
  const link = document.createElement('a');
  link.download = 'foto-editada-v6.png';
  link.href = canvas.toDataURL();
  link.click();
  if(temp!== null) selecionar(temp);
}

canvas.onclick = e => {
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;
  let achou = false;

  for(let i = objetos.length - 1; i >= 0; i--){
    let obj = objetos[i];
    ctx.font = `bold ${obj.size * obj.scale}px ${obj.fonte}`;
    let w = obj.tipo === 'texto'? ctx.measureText(obj.txt).width : obj.w * obj.scale;
    let h = obj.tipo === 'texto'? obj.size * obj.scale : obj.h * obj.scale;

    if(x > obj.x - w/2 && x < obj.x + w/2 && y > obj.y - h/2 && y < obj.y + h/2){
      selecionar(i);
      achou = true;
      break;
    }
  }
  if(!achou) desselecionar();
}

let isDragging = false, lastX, lastY;
canvas.ontouchstart = e => {
  if(e.touches.length === 1 && selecionado!== null){
    isDragging = true;
    let rect = canvas.getBoundingClientRect();
    lastX = e.touches[0].clientX - rect.left;
    lastY = e.touches[0].clientY - rect.top;
  }
}
canvas.ontouchmove = e => {
  if(isDragging && selecionado!== null){
    e.preventDefault();
    let rect = canvas.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left;
    let y = e.touches[0].clientY - rect.top;
    objetos[selecionado].x += x - lastX;
    objetos[selecionado].y += y - lastY;
    lastX = x; lastY = y;
    desenhar();
  }
}
canvas.ontouchend = () => { isDragging = false; }

fitToScreen();
desenhar();
</script>
</body>
</html>
